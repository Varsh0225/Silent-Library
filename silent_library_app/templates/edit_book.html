{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="mb-4">✏ Edit Book</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Book Title</label>
                    <input type="text" name="title" value="{{ book.title }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Author</label>
                    <input type="text" name="author" value="{{ book.author }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Genre</label>
                    <select name="genre" class="form-control">
                        <option value="fiction" {% if book.genre == 'fiction' %}selected{% endif %}>Fiction</option>
                        <option value="non-fiction" {% if book.genre == 'non-fiction' %}selected{% endif %}>Non-Fiction</option>
                        <option value="science" {% if book.genre == 'science' %}selected{% endif %}>Science</option>
                        <option value="history" {% if book.genre == 'history' %}selected{% endif %}>History</option>
                        <option value="biography" {% if book.genre == 'biography' %}selected{% endif %}>Biography</option>
                        <option value="technology" {% if book.genre == 'technology' %}selected{% endif %}>Technology</option>
                        <option value="mystery" {% if book.genre == 'mystery' %}selected{% endif %}>Mystery</option>
                        <option value="fantasy" {% if book.genre == 'fantasy' %}selected{% endif %}>Fantasy</option>
                        <option value="romance" {% if book.genre == 'romance' %}selected{% endif %}>Romance</option>
                        <option value="self-help" {% if book.genre == 'self-help' %}selected{% endif %}>Self Help</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="4">{{ book.description }}</textarea>
                </div>

                <div class="mb-3">
                    <label>ISBN Number</label>
                    <input type="text" name="isbn" value="{{ book.isbn }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Published Date</label>
                    <input type="date" name="published_date" value="{{ book.published_date|date:'Y-m-d' }}" class="form-control" required>
                </div>

                {% if book.cover_image %}
                <div class="mb-3">
                    <label>Current Cover</label><br>
                    <img src="{{ book.cover_image.url }}" width="150" class="rounded">
                </div>
                {% endif %}

                <div class="mb-3">
                    <label>Change Cover Image</label>
                    <input type="file" name="cover_image" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary">Update Book</button>
                <a href="{% url 'manage_books' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
